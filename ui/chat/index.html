<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lyft Support</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>" />
  <style>
    /* ── Reset ─────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --lyft-pink:   #FF00BF;
      --lyft-dark:   #1a1a2e;
      --lyft-mid:    #16213e;
      --sidebar-w:   280px;
      --header-h:    60px;
      --input-h:     72px;
      --gray-50:     #f9fafb;
      --gray-100:    #f3f4f6;
      --gray-200:    #e5e7eb;
      --gray-400:    #9ca3af;
      --gray-600:    #4b5563;
      --gray-900:    #111827;
      --agent-bubble:#f0f0f5;
      --user-bubble: #FF00BF;
      --radius:      16px;
      --shadow:      0 4px 24px rgba(0,0,0,.08);
    }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--gray-100); color: var(--gray-900); }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    .app { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ─────────────────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w); min-width: var(--sidebar-w);
      background: var(--lyft-dark); color: #fff;
      display: flex; flex-direction: column;
      border-right: 1px solid rgba(255,255,255,.08);
    }
    .sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .sidebar-logo .logo-icon { width: 32px; height: 32px; background: var(--lyft-pink); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .sidebar-logo span { font-size: 18px; font-weight: 700; }
    .new-chat-btn {
      width: 100%; padding: 10px; border: 1.5px solid rgba(255,255,255,.2);
      border-radius: 10px; background: transparent; color: #fff;
      font-size: 14px; font-weight: 500; cursor: pointer; display: flex;
      align-items: center; justify-content: center; gap: 8px; transition: all .2s;
    }
    .new-chat-btn:hover { background: rgba(255,0,191,.15); border-color: var(--lyft-pink); }
    .user-type-tabs { display: flex; gap: 6px; margin-top: 12px; }
    .tab-btn {
      flex: 1; padding: 7px; border: 1px solid rgba(255,255,255,.15);
      border-radius: 8px; background: transparent; color: rgba(255,255,255,.6);
      font-size: 13px; cursor: pointer; transition: all .2s;
    }
    .tab-btn.active { background: var(--lyft-pink); border-color: var(--lyft-pink); color: #fff; font-weight: 600; }
    .sidebar-convs { flex: 1; overflow-y: auto; padding: 12px 10px; }
    .sidebar-convs h4 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: rgba(255,255,255,.4); padding: 0 8px 8px; }
    .conv-item {
      padding: 10px 12px; border-radius: 10px; cursor: pointer;
      margin-bottom: 4px; transition: background .15s;
    }
    .conv-item:hover { background: rgba(255,255,255,.06); }
    .conv-item.active { background: rgba(255,0,191,.18); }
    .conv-item .conv-preview { font-size: 13px; color: rgba(255,255,255,.75); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-item .conv-meta { font-size: 11px; color: rgba(255,255,255,.35); margin-top: 3px; }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,.08); }
    .builder-link { display: flex; align-items: center; gap: 8px; font-size: 13px; color: rgba(255,255,255,.5); text-decoration: none; transition: color .2s; }
    .builder-link:hover { color: var(--lyft-pink); }

    /* ── Main chat area ────────────────────────────────────────────────── */
    .chat-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .chat-header {
      height: var(--header-h); padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      background: #fff; border-bottom: 1px solid var(--gray-200);
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
    }
    .chat-header-info h2 { font-size: 15px; font-weight: 600; }
    .chat-header-info p { font-size: 12px; color: var(--gray-400); }
    .status-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--gray-600);
      background: var(--gray-100); padding: 5px 12px; border-radius: 20px;
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; }
    .messages-wrap { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; background: var(--gray-50); }
    .welcome-msg { text-align: center; padding: 40px 20px; }
    .welcome-msg .welcome-icon { font-size: 48px; margin-bottom: 16px; }
    .welcome-msg h3 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .welcome-msg p { font-size: 15px; color: var(--gray-400); max-width: 360px; margin: 0 auto 24px; }
    .quick-actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 480px; margin: 0 auto; }
    .quick-btn {
      padding: 8px 16px; border: 1.5px solid var(--gray-200); border-radius: 20px;
      background: #fff; font-size: 13px; color: var(--gray-600); cursor: pointer;
      transition: all .2s;
    }
    .quick-btn:hover { border-color: var(--lyft-pink); color: var(--lyft-pink); background: rgba(255,0,191,.04); }

    /* ── Messages ──────────────────────────────────────────────────────── */
    .msg-row { display: flex; gap: 10px; max-width: 75%; animation: fadeUp .25s ease; }
    .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.agent { align-self: flex-start; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 15px; margin-top: 2px; }
    .avatar.agent-av { background: var(--lyft-pink); color: #fff; font-size: 13px; font-weight: 700; }
    .avatar.user-av { background: var(--gray-200); }
    .msg-body {}
    .bubble {
      padding: 12px 16px; border-radius: var(--radius); font-size: 14px;
      line-height: 1.55; max-width: 100%; word-break: break-word;
    }
    .agent .bubble { background: #fff; border: 1px solid var(--gray-200); border-bottom-left-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
    .user .bubble  { background: var(--lyft-pink); color: #fff; border-bottom-right-radius: 4px; }
    .msg-meta { display: flex; align-items: center; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
    .meta-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      background: var(--gray-100); color: var(--gray-600); border: 1px solid var(--gray-200);
    }
    .meta-badge.intent { background: #fdf4ff; color: #9333ea; border-color: #e9d5ff; }
    .meta-badge.agent  { background: #f0fdf4; color: #16a34a; border-color: #bbf7d0; }
    .meta-badge.tool   { background: #eff6ff; color: #2563eb; border-color: #bfdbfe; }
    .meta-badge.blocked { background: #fef2f2; color: #dc2626; border-color: #fecaca; }

    /* ── Typing indicator ──────────────────────────────────────────────── */
    .typing { display: flex; align-items: center; gap: 4px; padding: 14px 16px; background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius); border-bottom-left-radius: 4px; width: 60px; }
    .typing span { width: 6px; height: 6px; background: var(--gray-400); border-radius: 50%; animation: bounce .9s infinite; }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* ── Input bar ─────────────────────────────────────────────────────── */
    .input-bar {
      min-height: var(--input-h); padding: 12px 24px;
      background: #fff; border-top: 1px solid var(--gray-200);
      display: flex; align-items: flex-end; gap: 12px;
    }
    .input-wrap { flex: 1; position: relative; }
    #msg-input {
      width: 100%; padding: 12px 16px; border: 1.5px solid var(--gray-200);
      border-radius: 24px; font-size: 14px; font-family: inherit; resize: none;
      outline: none; transition: border-color .2s; line-height: 1.4;
      max-height: 120px; background: var(--gray-50);
    }
    #msg-input:focus { border-color: var(--lyft-pink); background: #fff; }
    #msg-input::placeholder { color: var(--gray-400); }
    .send-btn {
      width: 44px; height: 44px; border-radius: 50%; border: none;
      background: var(--lyft-pink); color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s; flex-shrink: 0;
    }
    .send-btn:hover { transform: scale(1.07); box-shadow: 0 4px 16px rgba(255,0,191,.4); }
    .send-btn:disabled { background: var(--gray-200); cursor: not-allowed; transform: none; box-shadow: none; }
    .send-btn svg { width: 18px; height: 18px; }

    /* ── Scrollbar ─────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 3px; }

    /* ── Responsive ────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .sidebar { display: none; }
      .msg-row { max-width: 90%; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="logo-icon">🚗</div>
        <span>Lyft Support</span>
      </div>
      <button class="new-chat-btn" onclick="newChat()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        New conversation
      </button>
      <div class="user-type-tabs">
        <button class="tab-btn active" id="tab-rider" onclick="setUserType('rider', this)">🧍 Rider</button>
        <button class="tab-btn" id="tab-driver" onclick="setUserType('driver', this)">🚗 Driver</button>
      </div>
    </div>
    <div class="sidebar-convs">
      <h4>Recent</h4>
      <div id="conv-list"></div>
    </div>
    <div class="sidebar-footer">
      <a class="builder-link" href="/builder" target="_blank">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4z"/></svg>
        Agent Builder (internal)
      </a>
    </div>
  </aside>

  <!-- Main chat -->
  <main class="chat-main">
    <header class="chat-header">
      <div class="chat-header-info">
        <h2 id="chat-title">Lyft Support</h2>
        <p id="chat-subtitle">Ask us anything about your ride or account</p>
      </div>
      <div class="status-badge">
        <div class="status-dot"></div>
        Online
      </div>
    </header>

    <div class="messages-wrap" id="messages">
      <!-- Welcome screen -->
      <div class="welcome-msg" id="welcome">
        <div class="welcome-icon">👋</div>
        <h3>Hi there! How can we help?</h3>
        <p>Get instant help with your Lyft rides, charges, account, and more.</p>
        <div class="quick-actions" id="quick-actions"></div>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="msg-input" rows="1" placeholder="Type your message..." autocomplete="off"></textarea>
      </div>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
        <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M22 2L11 13M22 2L15 22l-4-9-9-4z"/>
        </svg>
      </button>
    </div>
  </main>

</div>

<script>
const API = '';  // same origin
let conversationId = null;
let userType = 'rider';
let conversations = [];

// Quick action suggestions per user type
const QUICK_ACTIONS = {
  rider: [
    "I was overcharged for my trip",
    "I left something in the car",
    "My driver was rude",
    "Can you explain my charge?",
    "I need to update my account",
  ],
  driver: [
    "What were my earnings this week?",
    "A passenger damaged my car",
    "Where is my 1099 form?",
    "I can't access my account",
    "I have a question about my bonus",
  ],
};

// ── Init ──────────────────────────────────────────────────────────────────
function init() {
  renderQuickActions();
  loadConversations();

  const input = document.getElementById('msg-input');
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    document.getElementById('send-btn').disabled = !input.value.trim();
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
}

function renderQuickActions() {
  const container = document.getElementById('quick-actions');
  container.innerHTML = QUICK_ACTIONS[userType].map(q =>
    `<button class="quick-btn" onclick="sendQuick('${q}')">${q}</button>`
  ).join('');
}

function setUserType(type, btn) {
  userType = type;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderQuickActions();
}

// ── New conversation ──────────────────────────────────────────────────────
function newChat() {
  conversationId = null;
  document.getElementById('messages').innerHTML = `
    <div class="welcome-msg" id="welcome">
      <div class="welcome-icon">👋</div>
      <h3>Hi there! How can we help?</h3>
      <p>Get instant help with your Lyft rides, charges, account, and more.</p>
      <div class="quick-actions" id="quick-actions"></div>
    </div>`;
  renderQuickActions();
  document.getElementById('chat-title').textContent = 'Lyft Support';
  document.getElementById('chat-subtitle').textContent = 'Ask us anything about your ride or account';
  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
}

// ── Send message ─────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  removeWelcome();
  appendMessage('user', text);
  const typingEl = appendTyping();

  try {
    const res = await fetch(`${API}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, user_type: userType, conversation_id: conversationId }),
    });
    const data = await res.json();
    typingEl.remove();

    if (!res.ok) {
      appendMessage('agent', `Sorry, something went wrong: ${data.detail || 'Unknown error'}`, {});
      return;
    }

    conversationId = data.conversation_id;
    appendMessage('agent', data.response, {
      intent:      data.intent,
      agent_name:  data.agent_name,
      tool_calls:  data.tool_calls?.map(t => t.name) || [],
      blocked:     !data.safety_passed,
    });

    document.getElementById('chat-title').textContent = agentLabel(data.agent_name);
    document.getElementById('chat-subtitle').textContent = data.intent ? `Intent: ${data.intent.replace(/_/g,' ')}` : 'Lyft Support';
    loadConversations();
    highlightConv(conversationId);

  } catch(err) {
    typingEl.remove();
    appendMessage('agent', 'Unable to reach support right now. Please try again.', {});
  }
}

function sendQuick(text) {
  document.getElementById('msg-input').value = text;
  document.getElementById('send-btn').disabled = false;
  sendMessage();
}

// ── DOM helpers ───────────────────────────────────────────────────────────
function removeWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function appendMessage(role, content, meta = null) {
  const wrap = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const avatar = `<div class="avatar ${role === 'agent' ? 'agent-av' : 'user-av'}">${role === 'agent' ? 'LS' : '🧍'}</div>`;
  const bubble = `<div class="bubble">${escHtml(content)}</div>`;

  let metaHtml = '';
  if (meta && role === 'agent') {
    const parts = [];
    if (meta.blocked) parts.push(`<span class="meta-badge blocked">🚫 Blocked by safety</span>`);
    if (meta.intent) parts.push(`<span class="meta-badge intent">🎯 ${meta.intent.replace(/_/g,' ')}</span>`);
    if (meta.agent_name) parts.push(`<span class="meta-badge agent">🤖 ${meta.agent_name.replace(/_/g,' ')}</span>`);
    (meta.tool_calls || []).forEach(t => parts.push(`<span class="meta-badge tool">🔧 ${t}</span>`));
    if (parts.length) metaHtml = `<div class="msg-meta">${parts.join('')}</div>`;
  }

  row.innerHTML = `${avatar}<div class="msg-body">${bubble}${metaHtml}</div>`;
  wrap.appendChild(row);
  wrap.scrollTop = wrap.scrollHeight;
  return row;
}

function appendTyping() {
  const wrap = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row agent';
  row.innerHTML = `<div class="avatar agent-av">LS</div><div class="msg-body"><div class="typing"><span></span><span></span><span></span></div></div>`;
  wrap.appendChild(row);
  wrap.scrollTop = wrap.scrollHeight;
  return row;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

function agentLabel(name) {
  if (!name) return 'Lyft Support';
  const map = { rider_intent:'Rider Support', driver_intent:'Driver Support', earnings:'Earnings Support', damage_claim:'Damage Claims', driver_tax:'Tax Support', charge_review:'Billing Support', rider_general:'General Support' };
  return map[name] || name.replace(/_/g,' ');
}

// ── Conversation sidebar ──────────────────────────────────────────────────
async function loadConversations() {
  try {
    const res = await fetch(`${API}/api/conversations`);
    const data = await res.json();
    conversations = data;
    renderConvList();
  } catch(e) {}
}

function renderConvList() {
  const list = document.getElementById('conv-list');
  if (!conversations.length) { list.innerHTML = '<p style="font-size:12px;color:rgba(255,255,255,.3);padding:0 8px">No conversations yet</p>'; return; }
  list.innerHTML = conversations.slice().reverse().map(c => `
    <div class="conv-item ${c.conversation_id === conversationId ? 'active' : ''}" onclick="loadConv('${c.conversation_id}')">
      <div class="conv-preview">${escHtml(c.preview || 'New conversation')}</div>
      <div class="conv-meta">${c.message_count} messages · ${c.conversation_id.slice(0,8)}</div>
    </div>`).join('');
}

async function loadConv(id) {
  try {
    const res = await fetch(`${API}/api/conversations/${id}`);
    const data = await res.json();
    conversationId = id;
    document.getElementById('messages').innerHTML = '';
    data.messages.forEach(m => appendMessage(m.role, m.content, { intent: m.intent, agent_name: m.agent_name, tool_calls: m.tool_calls }));
    highlightConv(id);
  } catch(e) {}
}

function highlightConv(id) {
  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.conv-item').forEach(el => { if (el.onclick?.toString().includes(id)) el.classList.add('active'); });
  renderConvList();
}

init();
</script>
</body>
</html>
